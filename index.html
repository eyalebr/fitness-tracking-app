<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracking App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-container">

        <header class="top-header">
            <div class="greeting-area">
                <h1>Good Morning</h1>
                <p class="date">Sunday, February 9, 2026</p>
            </div>
            <div class="profile-icon">
                <img src="images/icon.png" alt="Profile">
            </div>
        </header>

        <main>
            <section class="data-summary">
                <h2>Daily Summary</h2>
                
                <div class="stats-container">
                    
                    <div class="stat-card">
                        <div class="stat-top">
                            <div class="stat-left">
                                <span class="icon">👣</span>
                                <div class="stat-info">
                                    <span class="stat-title">Steps</span>
                                    <span class="stat-value">8,547</span>
                                </div>
                            </div>
                            <div class="stat-right">
                                <span class="stat-goal">Goal: 10,000</span>
                            </div>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: 85%;"></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-top">
                            <div class="stat-left">
                                <span class="icon">🔥</span>
                                <div class="stat-info">
                                    <span class="stat-title">Calories</span>
                                    <span class="stat-value">520</span>
                                </div>
                            </div>
                            <div class="stat-right">
                                <span class="stat-goal">Goal: 600</span>
                            </div>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: 86%;"></div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-top">
                            <div class="stat-left">
                                <span class="icon">⏱️</span>
                                <div class="stat-info">
                                    <span class="stat-title">Active Time</span>
                                    <span class="stat-value">45 <span class="unit">min</span></span>
                                </div>
                            </div>
                            <div class="stat-right">
                                <span class="stat-goal">Goal: 60 min</span>
                            </div>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: 75%;"></div>
                        </div>
                    </div>

                </div>
            </section>

            <button class="primary-btn start-workout">
                <img src="images/icon.png" alt="Pulse" class="btn-icon"> Start Workout
            </button>

            <section class="weekly-progress-card">
                
                <div class="weekly-header">
                    <span class="trend-icon">📈</span>
                    <h2>Weekly Progress</h2>
                </div>
                
                <div class="progress-details">
                    <div class="progress-row">
                        <span class="row-label">Workouts Completed</span>
                        <span class="row-value">5/7</span>
                    </div>
                    <div class="progress-row">
                        <span class="row-label">Total Distance</span>
                        <span class="row-value">24.5 km</span>
                    </div>
                    <div class="progress-row">
                        <span class="row-label">Calories Burned</span>
                        <span class="row-value">2,340 kcal</span>
                    </div>
                </div>
                
                <button class="secondary-btn">View Full Analytics</button>
                
            </section>
            
        </main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>Settings</span>
            </a>
        </nav>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
