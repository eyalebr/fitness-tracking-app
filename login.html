<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fitness Tracking App</title>
    <link rel="stylesheet" href="../fitness-tracking-app/css/styleLogin.css">
</head>
<body>

    <div class="login-container">
        
        <div class="header-section">
            <div class="logo-icon">
                <img src="../fitness-tracking-app/images/icon.png" alt="Fitness Logo" style="width: 45px; height: 45px; object-fit: contain;">
            </div>
            <h1>Welcome to Fitness Tracking <br>app</h1>
            <p>Track your fitness journey</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">
                <span class="error-message" id="passwordError"></span>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="primary-btn">Login</button>
        </form>

        <div class="footer-links">
            <a href="#" class="forgot-password">Forgot your password?</a>
            <p>Don't have an account? <a href="register.html" class="register-link">Register</a></p>
        </div>
    </div>

    <script src="../fitness-tracking-app/js/scriptLogin.js"></script>
</body>
</html>
